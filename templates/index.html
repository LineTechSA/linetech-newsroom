<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineTech Newsroom</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Tahoma,sans-serif;
margin:0;
padding:0;
}

header{
background:#111;
padding:20px;
border-bottom:2px solid red;
}

.logo{
font-size:32px;
font-weight:bold;
color:red;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#151515;
border-radius:15px;
padding:20px;
border:1px solid #333;
}

.card h3{
margin-top:0;
color:red;
}

textarea{
width:100%;
height:180px;
background:#101010;
color:white;
border:1px solid #333;
border-radius:10px;
padding:15px;
}

button{
background:red;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<div class="logo">🎮 LineTech Newsroom</div>
</header>

<div class="container">

<h1>غرفة أخبار لاين تك</h1>

<div class="grid">

<div class="card">
<h3>🚨 GTA 6</h3>
<p>بانتظار ربط الأخبار</p>
</div>

<div class="card">
<h3>🧟 Resident Evil</h3>
<p>بانتظار ربط أخبار كابكوم</p>
</div>

<div class="card">
<h3>🎖 Battlefield</h3>
<p>بانتظار ربط الأخبار</p>
</div>

<div class="card">
<h3>🎮 Call of Duty</h3>
<p>بانتظار ربط الأخبار</p>
</div>

<div class="card">
<h3>💙 PlayStation</h3>
<p>بانتظار ربط الأخبار</p>
</div>

<div class="card">
<h3>💚 Xbox</h3>
<p>بانتظار ربط الأخبار</p>
</div>

</div>

<hr>

<h2>📦 البكج الكامل</h2>

<textarea placeholder="سيظهر البكج هنا"></textarea>

<br><br>

<button>Generate Package</button>

<hr>

<h2>🖼️ برومبت الثمنيل</h2>

<textarea placeholder="سيظهر برومبت الثمنيل هنا"></textarea>

<br><br>

<button>Generate Thumbnail Prompt</button>

</div>

</body>
</html>
